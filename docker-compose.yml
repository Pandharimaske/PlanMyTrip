version: "3.9"

services:
  backend:
    build: ./backend
    container_name: planmytrip-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - memory_data:/app/memory_store
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_GOOGLE_MAPS_KEY=${VITE_GOOGLE_MAPS_KEY}
    container_name: planmytrip-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  memory_data:
